name: Notify LMS Deploy (Landing)
on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger landing deployment
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.LMS_DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/olgagaga/lms-deploy/dispatches \
            -d '{"event_type":"landing_update","client_payload":{"sha":"${{ github.sha }}"}}'
